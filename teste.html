<style>
body{
  font-family: Inter;
  margin:0;
  background:#f6f7fb;
}

.wrapper{
  max-width:1200px;
  margin:auto;
  padding:30px 16px 100px;
}

.header{
  text-align:center;
}

.header h1{
  font-size:30px;
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px 0;
}

.filters input, select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  box-shadow:0 8px 20px rgba(0,0,0,.06);
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.name{
  font-weight:700;
}

.meta{
  font-size:12px;
  color:#666;
}

.tags{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.tag{
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  background:#e8f1ff;
  color:#1b66ff;
}

.price{
  margin-top:10px;
  font-weight:700;
  color:#00a8ff;
}

.empty{
  text-align:center;
  padding:40px;
  color:#777;
}
</style>

  </header>

<body>

<div class="wrapper">

  <div class="header">
    <h1>Descobrir Profissionais</h1>
    <p>Encontre serviços perto de você</p>
  </div>

  <div class="filters">
    <input id="busca" placeholder="Buscar...">

    <select id="categoria"><option value="">Categoria</option></select>
    <select id="tipo"><option value="">Tipo</option></select>
    <select id="produto"><option value="">Produto</option></select>

    <select id="estado"><option value="">Estado</option></select>
    <select id="cidade"><option value="">Cidade</option></select>
    <select id="bairro"><option value="">Bairro</option></select>
  </div>

  <div class="grid" id="grid"></div>
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">

<script type="module">
import { supabase } from "./js/supabase.js";

const grid = document.getElementById("grid");

const busca = document.getElementById("busca");
const categoria = document.getElementById("categoria");
const tipo = document.getElementById("tipo");
const produto = document.getElementById("produto");

const estado = document.getElementById("estado");
const cidade = document.getElementById("cidade");
const bairro = document.getElementById("bairro");

let catalogo = [];
let servicos = [];
let usuarios = {};
let catalogoMap = {};

/* ===================== */
function parseEndereco(e){
  try{ return typeof e==="string"?JSON.parse(e):e }
  catch{return {}}
}

/* ===================== */
async function load(){

  const { data: cat } = await supabase.from("servicos_catalogo").select("*");
  catalogo = cat || [];

  catalogo.forEach(c => catalogoMap[c.id] = c);

  const { data: serv } = await supabase
    .from("servicos_prestador_v2")
    .select("*")
    .eq("ativo", true);

  servicos = serv || [];

  const ids = [...new Set(servicos.map(s => s.prestador_id))];

  const { data: users } = await supabase
    .from("usuarios")
    .select("*")
    .in("user_id", ids);

  (users||[]).forEach(u=>{
    u.endereco = parseEndereco(u.endereco);
    usuarios[u.user_id]=u;
  });

  fillFilters();
  render();
}

/* ===================== */
/* 🔥 PEGA SÓ O QUE EXISTE */
function getBase(){
  return servicos.map(s=>catalogoMap[s.servico_id]).filter(Boolean);
}

/* ===================== */
function fillFilters(){

  const base = getBase();

  const cat = categoria.value;
  const t = tipo.value;
  const p = produto.value;

  let filtrado = base;

  if(cat) filtrado = filtrado.filter(c=>c.categoria===cat);
  if(t) filtrado = filtrado.filter(c=>c.tipo_servico===t);

  // CATEGORIA
  categoria.innerHTML = `<option value="">Categoria</option>`;
  [...new Set(base.map(c=>c.categoria))]
    .forEach(c=>{
      categoria.innerHTML += `<option ${c===cat?"selected":""}>${c}</option>`;
    });

  // TIPO
  const tiposBase = cat ? base.filter(c=>c.categoria===cat) : base;

  tipo.innerHTML = `<option value="">Tipo</option>`;
  [...new Set(tiposBase.map(c=>c.tipo_servico))]
    .forEach(x=>{
      tipo.innerHTML += `<option ${x===t?"selected":""}>${x}</option>`;
    });

  // PRODUTO
  produto.innerHTML = `<option value="">Produto</option>`;
  [...new Set(filtrado.map(c=>c.produto))]
    .forEach(x=>{
      produto.innerHTML += `<option ${x===p?"selected":""}>${x}</option>`;
    });

  // ENDEREÇO DINÂMICO
  const estados=new Set(), cidades=new Set(), bairros=new Set();

  servicos.forEach(s=>{

    const c = catalogoMap[s.servico_id];
    if(!c) return;

    if(cat && c.categoria!==cat) return;
    if(t && c.tipo_servico!==t) return;
    if(p && c.produto!==p) return;

    const u = usuarios[s.prestador_id];
    if(!u) return;

    const e = u.endereco || {};

    if(e.estado) estados.add(e.estado);
    if(e.cidade) cidades.add(e.cidade);
    if(e.bairro) bairros.add(e.bairro);

  });

  estado.innerHTML=`<option value="">Estado</option>`;
  estados.forEach(x=>estado.innerHTML+=`<option>${x}</option>`);

  cidade.innerHTML=`<option value="">Cidade</option>`;
  cidades.forEach(x=>cidade.innerHTML+=`<option>${x}</option>`);

  bairro.innerHTML=`<option value="">Bairro</option>`;
  bairros.forEach(x=>bairro.innerHTML+=`<option>${x}</option>`);
}

/* ===================== */
function render(){

  const f = busca.value.toLowerCase();
  const cat = categoria.value;
  const t = tipo.value;
  const p = produto.value;

  const est = estado.value;
  const cid = cidade.value;
  const bai = bairro.value;

  const result = servicos.filter(s=>{

    const c = catalogoMap[s.servico_id];
    if(!c) return false;

    const u = usuarios[s.prestador_id];
    if(!u) return false;

    const e = u.endereco||{};

    return (
      (!f || u.nome?.toLowerCase().includes(f) || c.produto?.toLowerCase().includes(f)) &&
      (!cat || c.categoria===cat) &&
      (!t || c.tipo_servico===t) &&
      (!p || c.produto===p) &&
      (!est || e.estado===est) &&
      (!cid || e.cidade===cid) &&
      (!bai || e.bairro===bai)
    );

  });

  grid.innerHTML="";

  if(!result.length){
    grid.innerHTML=`<div class="empty">Nenhum resultado</div>`;
    return;
  }

  result.forEach(s=>{

    const u = usuarios[s.prestador_id];
    const c = catalogoMap[s.servico_id];
    const e = u.endereco||{};

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="name">${u.nome}</div>
      <div class="meta">${e.cidade||""} - ${e.bairro||""}</div>

      <div class="tags">
        <span class="tag">${c.categoria}</span>
        <span class="tag">${c.tipo_servico}</span>
        <span class="tag">${c.produto}</span>
      </div>

      <div class="price">R$ ${s.preco}</div>
    `;

    grid.appendChild(card);

  });

}

/* ===================== */
/* 🔥 EVENTOS CORRETOS */
busca.oninput = render;

categoria.onchange = ()=>{
  tipo.value="";
  produto.value="";
  fillFilters();
  render();
};

tipo.onchange = ()=>{
  produto.value="";
  fillFilters();
  render();
};

produto.onchange = ()=>{
  fillFilters();
  render();
};

estado.onchange = render;
cidade.onchange = render;
bairro.onchange = render;

load();
</script>
</body>
