<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00A8FF">
  <meta name="description" content="Seu perfil no Boralá Tche - Gerencie suas informações e serviços">
  <title>Meu Perfil | Boralá Tche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    
    /* =====================================
       PÁGINA PERFIL PÚBLICO
    ===================================== */
    .perfil-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px var(--space-md) 120px;
    }
    .card_background{
          background: var(--color-surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--color-border-light);
      transition: var(--transition-normal);
    }


    /* Seção da foto */
    .foto-section {
      text-align: center;
      margin-bottom: var(--space-lg);
    }
    
    .foto-perfil {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--color-primary);
      padding: 4px;
      background: white;
      box-shadow: 0 8px 30px rgba(0, 168, 255, 0.25);
      transition: var(--transition-normal);
    }
    
    .foto-perfil:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(0, 168, 255, 0.35);
    }
    
    /* Informações principais */
    .info-principal {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    
    .info-principal h2 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      margin-bottom: var(--space-md);
    }
    
    .linha-topo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-md);
      flex-wrap: wrap;
    }
    
    .badge-tipo {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: white;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    
    
    /* Box de informações */
    .info-box {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-border-light);
      margin-bottom: var(--space-xl);
    }
    
    .info-item {
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .info-item svg {
      width: 18px;
      height: 18px;
      stroke: var(--color-primary);
      flex-shrink: 0;
    }
    
    /* Tags de serviços */
    .tags-servicos {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-top: var(--space-lg);
    }
    
    .tag {
      background: rgba(0, 168, 255, 0.1);
      color: var(--color-primary);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
    }
    
    /* Agenda box */
    .agenda-box {
      margin-top: var(--space-lg);
      background: var(--color-border-light);
      padding: var(--space-md);
      border-radius: var(--radius-lg);
    }
    
    .agenda-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-sm);
    }
    
    .agenda-header h3 {
      font-size: var(--font-size-sm);
      font-weight: 600;
    }
    
    .ver-mais {
      font-size: var(--font-size-xs);
      color: var(--color-primary);
      cursor: pointer;
      font-weight: 600;
    }
    
    .hoje-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .horario {
      background: rgba(34, 197, 94, 0.15);
      color: var(--color-success);
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
    }
    
    .fechado {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-error);
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
    }
    
    .intervalo {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-xs);
    }
    
    .lista-completa {
      margin-top: var(--space-md);
      display: none;
    }
    
    .linha-dia {
      display: flex;
      justify-content: space-between;
      padding: var(--space-sm) 0;
      border-top: 1px solid var(--color-border);
      font-size: var(--font-size-xs);
    }
    
    /* Área do prestador */
    #areaPrestador {
      margin-top: var(--space-xl);
    }
    
    /* Filtros */
    .filtros {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    
    .filtros select {
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-full);
      border: 2px solid var(--color-border);
      font-size: var(--font-size-sm);
      background: var(--color-surface);
      cursor: pointer;
      transition: var(--transition-fast);
      min-width: 180px;
    }
    
    .filtros select:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    
 /* GRID */
.grid-produtos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
}

/* CARD BASE */
.card_background {
  display: flex;
  flex-direction: column;
  border-radius: 16px;
  overflow: hidden;
  background: var(--color-surface);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s ease;
}

.card_background:hover {
  transform: translateY(-6px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.15);
}

/* SLIDER */
.slider {
  position: relative;
  height: 180px;
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.4s ease;
}

.slide-img {
  width: 100%;
  flex-shrink: 0;
  object-fit: cover;
}

/* INDICADORES */
.indicadores {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
}

.dot.ativo {
  background: #fff;
  transform: scale(1.2);
}

/* CONTEÚDO */
.card-content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* TITULO */
.card-content h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 0;
  color: var(--color-text);
}

/* TEXTO */
.card-content p {
  font-size: 13px;
  color: var(--color-text-muted);
  margin: 0;
}

/* PREÇO DESTACADO */
.card-content p:last-of-type {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-primary);
}

/* BOTÃO */
.btn-agendar {
  margin-top: 10px;
  border: none;
  background: linear-gradient(135deg, #00A8FF, #0077cc);
  color: white;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-agendar:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

.card-content p:first-of-type {
  background: rgba(0,168,255,0.1);
  color: var(--color-primary);
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  width: fit-content;
}
    /* Slider de imagens */
    .slider {
      position: relative;
      overflow: hidden;
      height: 180px;
    }
    
    .slides {
      display: flex;
      transition: transform 0.4s ease;
      height: 100%;
    }
    
    .slide-img {
      width: 100%;
      flex-shrink: 0;
      object-fit: cover;
    }
    
    .indicadores {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(218, 159, 255, 0.6);
      cursor: pointer;
      transition: var(--transition-fast);
    }
    
    .dot.ativo {
      background: var(--color-primary);
      transform: scale(1.2);
    }
    
    @media (max-width: 600px) {
      .foto-perfil {
        width: 120px;
        height: 120px;
      }
      
      .info-principal h2 {
        font-size: var(--font-size-xl);
      }
      
      .info-box {
        padding: var(--space-lg);
      }
      
      .grid-produtos {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
