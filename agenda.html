<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00A8FF">
  <meta name="description" content="Gerencie sua agenda de serviços de estética no Boralá Tche">
  <title>Agenda | Boralá Tche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    /* =====================================
       PÁGINA AGENDA
    ===================================== */
    .agenda-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px var(--space-md) 120px;
    }
    
    /* Header da página */
    .agenda-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    
    .agenda-header h1 {
      font-size: var(--font-size-3xl);
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-text) 0%, var(--color-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-xs);
    }
    
    .agenda-header p {
      color: var(--color-text-muted);
      font-size: var(--font-size-base);
    }
    
    /* Container da agenda */
    .agenda-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
    }
    
    @media (min-width: 768px) {
      .agenda-container {
        grid-template-columns: 380px 1fr;
      }
    }
    
    /* Cards de calendário e horários */
    .calendario,
    .horarios {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-border-light);
    }
    
    /* Header do calendário */
    .calendario-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
    }
    
    .calendario-header h3 {
      font-weight: 700;
      text-transform: capitalize;
      font-size: var(--font-size-lg);
    }
    
    .calendario-nav {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--color-border-light);
      color: var(--color-text);
      cursor: pointer;
      transition: var(--transition-normal);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .calendario-nav:hover {
      background: var(--color-primary);
      color: white;
      transform: scale(1.05);
    }
    
    /* Dias da semana */
    .dias-semana {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--space-xs);
      margin-bottom: var(--space-md);
      text-align: center;
    }
    
    .dias-semana span {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-text-muted);
      padding: var(--space-sm);
    }
    
    /* Grid dos dias */
    .grid-dias {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    
    .grid-dias div {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      font-size: var(--font-size-sm);
      background: var(--color-surface);
      transition: var(--transition-normal);
      position: relative;
    }
    
    .grid-dias div:hover {
      background: rgba(0, 168, 255, 0.1);
      transform: scale(1.05);
    }
    
    .dia-ativo {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)) !important;
      color: white !important;
      box-shadow: 0 4px 15px rgba(0, 168, 255, 0.4);
      transform: scale(1.05);
    }
    
    .dia-disponivel {
      color: var(--color-primary);
      border: 1px solid rgba(0, 168, 255, 0.3);
    }
    
    .dia-disponivel::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--color-primary);
    }
    
    .dia-ocupado {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
    }
    
    /* Seção de horários */
    .horarios h3 {
      font-size: var(--font-size-lg);
      font-weight: 700;
      margin-bottom: var(--space-lg);
      color: var(--color-text);
    }
    
    .lista-horarios {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    
    .horario-item {
      padding: var(--space-md) var(--space-lg);
      border-radius: var(--radius-lg);
      background: var(--color-border-light);
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition-normal);
      font-weight: 500;
      font-size: var(--font-size-sm);
    }
    
    .horario-item:hover {
      transform: scale(1.05);
      background: rgba(0, 168, 255, 0.1);
      border-color: var(--color-primary);
    }
    
    .horario-item.selected {
      background: var(--color-primary);
      color: white;
    }
    
    .horario-item.indisponivel {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
      cursor: not-allowed;
      opacity: 0.7;
    }
    
    /* Painel de informações */
    .painel-info {
      background: linear-gradient(135deg, var(--color-text) 0%, #374151 100%);
      color: white;
      padding: var(--space-md);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-md);
      animation: slideUp 0.3s ease;
    }
    
    .painel-info h4 {
      font-size: var(--font-size-base);
      margin-bottom: var(--space-xs);
    }
    
    .painel-info p {
      font-size: var(--font-size-sm);
      opacity: 0.9;
    }
    
    /* Modal de agendamento */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      padding: var(--space-md);
      animation: fadeIn 0.2s ease;
    }
    
    .modal.hidden {
      display: none;
    }
    
    .modal-content {
      width: 100%;
      max-width: 450px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      position: relative;
      animation: scaleIn 0.25s ease;
      box-shadow: var(--shadow-xl);
    }
    
    .modal-content h2 {
      font-size: var(--font-size-xl);
      margin-bottom: var(--space-md);
    }
    
    .modal-content p {
      margin: var(--space-sm) 0;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }
    
    #fecharModal {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      width: 36px;
      height: 36px;
      border: none;
      background: var(--color-border-light);
      border-radius: var(--radius-full);
      font-size: var(--font-size-lg);
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #fecharModal:hover {
      background: var(--color-error);
      color: white;
    }
    
    /* Link WhatsApp */
    .modal-content a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      background: #25D366;
      color: white;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition-normal);
    }
    
    .modal-content a:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
    }
    
    @media (max-width: 600px) {
      .agenda-header h1 {
        font-size: var(--font-size-2xl);
      }
      
      .calendario,
      .horarios {
        padding: var(--space-md);
      }
    }
  </style>
</head>
<body>
