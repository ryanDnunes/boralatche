<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00A8FF">
  <meta name="description" content="Entre no Boralá Tche - Encontre os melhores profissionais de estética">
  <title>Entrar | Boralá Tche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login_cadastro.css">
</head>
<body>
  <!-- Decorações de fundo -->
  <div class="bg-decoration bg-decoration-1"></div>
  <div class="bg-decoration bg-decoration-2"></div>
  
  <!-- Container do formulário -->
  <div class="auth-container">
    <img src="img/logo.png" class="logo" alt="Logo Boralá Tche">
    
    <h1>Entrar no <span>Boralá</span></h1>
    <p class="subtitle">Bem-vindo de volta! Entre com suas credenciais</p>
    
    <input id="email" type="email" placeholder="Seu e-mail" autocomplete="email" required>
    <input id="senha" type="password" placeholder="Sua senha" autocomplete="current-password" required>
    
    
    <button onclick="login()">Entrar</button>
    
    <div class="divider">ou</div>
    
    <button onclick="window.location.href='cadastro.html'">Criar uma conta</button>
    
    <!-- Contêiner para mensagens de erro -->
    <div id="mensagem-erro"></div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
